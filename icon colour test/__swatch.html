<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Icon read-state colour test</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: #1c1917; font-family: ui-sans-serif, system-ui; }
</style>
</head>
<body class="p-10">
  <h1 class="text-amber-100 text-2xl font-black uppercase tracking-wider mb-2">
    Icon read-state colour test
  </h1>
  <p class="text-amber-100/60 text-sm mb-2">
    Daily icon — current "unopened" amber state on the left, then 10 candidate "opened/read" treatments.
    Hover one and pick what feels like "I've already checked this".
  </p>
  <p class="text-amber-100/40 text-xs mb-8">
    All keep the same border + drop shadow + size; only fill, icon colour, and (where noted) opacity change.
  </p>

  <div class="grid grid-cols-3 gap-x-12 gap-y-10">
    <!-- swatches injected by JS -->
  </div>

<script>
  const variants = [
    { label: "Unopened (current)",           bg: "#fbbf24", fg: "#1c1917", border: "#1c1917", op: 1,    note: "amber-400 / stone-900" },
    { label: "Inverted — stone-900 fill",    bg: "#1c1917", fg: "#fbbf24", border: "#1c1917", op: 1,    note: "stone-900 / amber-400" },
    { label: "Inverted darker — stone-800",  bg: "#292524", fg: "#fde047", border: "#1c1917", op: 1,    note: "stone-800 / yellow-300" },
    { label: "Greyed flat — stone-300",      bg: "#d6d3d1", fg: "#57534e", border: "#1c1917", op: 1,    note: "stone-300 / stone-600" },
    { label: "Greyed dim — stone-600",       bg: "#57534e", fg: "#a8a29e", border: "#1c1917", op: 1,    note: "stone-600 / stone-400" },
    { label: "Faded amber — opacity 50%",    bg: "#fbbf24", fg: "#1c1917", border: "#1c1917", op: 0.5,  note: "amber-400 @ 50%" },
    { label: "Faded amber — opacity 35%",    bg: "#fbbf24", fg: "#1c1917", border: "#1c1917", op: 0.35, note: "amber-400 @ 35%" },
    { label: "Pale amber — amber-200",       bg: "#fde68a", fg: "#78350f", border: "#1c1917", op: 1,    note: "amber-200 / amber-900" },
    { label: "Outline only — stone-50",      bg: "#fafaf9", fg: "#a8a29e", border: "#a8a29e", op: 1,    note: "stone-50 / stone-400, lighter border" },
    { label: "Hollow — transparent",         bg: "transparent", fg: "#a8a29e", border: "#57534e", op: 1, note: "no fill / stone-400" },
    { label: "Subtle stone — stone-700",     bg: "#44403c", fg: "#d6d3d1", border: "#1c1917", op: 1,    note: "stone-700 / stone-300" },
  ];

  const grid = document.querySelector(".grid");
  for (const v of variants) {
    const wrap = document.createElement("div");
    wrap.className = "flex items-center gap-4";
    wrap.innerHTML = `
      <button
        class="inline-flex h-11 w-11 items-center justify-center rounded-full shadow-[0_2px_0_0_rgba(0,0,0,0.9)]"
        style="background:${v.bg}; color:${v.fg}; border: 2px solid ${v.border}; opacity:${v.op};">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 2v4"/><path d="M16 2v4"/>
          <rect width="18" height="18" x="3" y="4" rx="2"/>
          <path d="M3 10h18"/>
        </svg>
      </button>
      <div class="text-amber-100">
        <div class="text-sm font-black tracking-wider uppercase">${v.label}</div>
        <div class="text-xs font-mono text-amber-100/50">${v.note}</div>
      </div>
    `;
    grid.appendChild(wrap);
  }
</script>
</body>
</html>
